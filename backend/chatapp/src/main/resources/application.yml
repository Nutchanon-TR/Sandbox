spring:
  application:
    name: backend
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://db.xabewjiiewyhhjfekazv.supabase.co:5432/postgres
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ai:
    openai:
      api-key: ${GROK_API_KEY}
      base-url: "https://api.groq.com/openai"
      chat:
        options:
          model: "llama-3.3-70b-versatile"
      embedding:
        enabled: false
  data:
    redis:
      host: redis
      port: 6379
  cache:
    type: redis

server:
  error:
    include-stacktrace: on_param
    include-exception: true

app:
  cors:
    allowedOrigins:
      - http://localhost:5173
      - http://localhost:8080
      - http://localhost:3000
  api:
    prefix:
      b-post: v1/api/b-post
      dinner: v1/api/dinner
      chat-app: v1/api/chat-app
  supabase:
    url: https://xabewjiiewyhhjfekazv.supabase.co
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    storage:
      bucket-name: images
