worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Upstreams for Docker Compose services
    upstream frontend {
        server frontend:3000;
    }
    
    upstream chat_backend {
        server chat-backend:8080;
    }

    upstream dinner_backend {
        server dinner-backend:8080;
    }

    upstream bpost_backend {
        server bpost-backend:8080;
    }

    upstream oauth2_proxy {
        server oauth2-proxy:4180;
    }

    server {
        listen 80;
        server_name localhost;

        # ----------------------------------------
        # OAuth2 Proxy Endpoints
        # ----------------------------------------
        location /oauth2/ {
            proxy_pass       http://oauth2_proxy;
            proxy_set_header Host                    $host;
            proxy_set_header X-Real-IP               $remote_addr;
            proxy_set_header X-Scheme                $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
        }

        # ----------------------------------------
        # Frontend Routes
        # ----------------------------------------
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----------------------------------------
        # Backend API Routes
        # ----------------------------------------
        # Chat Service
        location /v1/api/chat/ {
            # => Uncomment the following block to enable JWT sidecar validation 
            # auth_request /oauth2/auth;
            # error_page 401 = /oauth2/sign_in;
            # auth_request_set $user   $upstream_http_x_auth_request_user;
            # auth_request_set $email  $upstream_http_x_auth_request_email;
            # proxy_set_header X-User-Id $user;
            # proxy_set_header X-User-Email $email;

            proxy_pass http://chat_backend/v1/api/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Dinner Service
        location /v1/api/supplier-order/ {
            proxy_pass http://dinner_backend/v1/api/supplier-order/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # B-Post Service (Image/Storage)
        location /v1/api/bpost/ {
            proxy_pass http://bpost_backend/v1/api/bpost/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Legacy Report endpoint (routing to B-Post since it's the new storage service)
        location /v1/api/report/ {
            proxy_pass http://bpost_backend/v1/api/bpost/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
