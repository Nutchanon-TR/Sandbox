version: '3.8'

services:
  # ----------------------------------------
  # API Gateway (Nginx)
  # ----------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - frontend
      - chat-backend
      - dinner-backend
      - bpost-backend
      - oauth2-proxy
    networks:
      - sandbox_net
    restart: unless-stopped

  # ----------------------------------------
  # OAuth2 Validation Sidecar
  # ----------------------------------------
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    command:
      - "--http-address=0.0.0.0:4180"
      - "--provider=oidc"
      - "--oidc-issuer-url=https://${SUPABASE_PROJECT_ID:-YOUR_SUPABASE_ID}.supabase.co"
      - "--skip-provider-button=true"
      - "--email-domain=*"
      - "--cookie-secret=OAUTH2_PROXY_COOKIE_SECRET_32_BYTES"
      - "--cookie-secure=false" # Set true in production
      - "--upstream=http://dummy" # Nginx is actually reversing to OAuth, we don't use this routing directly.
      - "--skip-jwt-bearer-tokens=true" # VERY IMPORTANT: to parse Authorization: Bearer <jwt> headers
      - "--extra-jwt-issuers=https://${SUPABASE_PROJECT_ID:-YOUR_SUPABASE_ID}.supabase.co=https://${SUPABASE_PROJECT_ID:-YOUR_SUPABASE_ID}.supabase.co"
    environment:
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID:-DUMMY}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET:-DUMMY}
    networks:
      - sandbox_net
    restart: unless-stopped

  # ----------------------------------------
  # Next.js Frontend
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # No exposed ports because Gateway handles it
    networks:
      - sandbox_net
    environment:
      # Tell the frontend to query its own domain locally (via Nginx)
      - NEXT_PUBLIC_API_URL=http://localhost
    restart: unless-stopped

  # ----------------------------------------
  # Backend Services
  # ----------------------------------------
  chat-backend:
    build:
      context: ./backend/chatapp
      dockerfile: Dockerfile
    networks:
      - sandbox_net
    restart: unless-stopped

  dinner-backend:
    build:
      context: ./backend/dinner
      dockerfile: Dockerfile
    networks:
      - sandbox_net
    restart: unless-stopped

  bpost-backend:
    build:
      context: ./backend/bpost
      dockerfile: Dockerfile
    networks:
      - sandbox_net
    restart: unless-stopped

networks:
  sandbox_net:
    driver: bridge
